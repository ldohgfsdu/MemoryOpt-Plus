# ============================================================
#  MemoryOpt Plus 配置文件
#  修改后自动热重载（Rust 引擎 <100ms / Shell 引擎 ~5s）
# ============================================================

# ── ZRAM 压缩算法 ──────────────────────────
# lz4 (推荐) | zstd (高压缩比) | lz4hc | lzo | lzo-rle | deflate
# zstd 需要内核支持，不支持时自动降级 lz4
algorithm=lz4

# ── ZRAM 大小 ──────────────────────────────
# 格式1: 因子 (如 2.0 = 内存×2)
# 格式2: 绝对值 (如 2048M, 4G)
# 下限: max(128MB, 内存/8)  上限: 16384MB
zram_size=2.0

# ── 最大压缩流数 ───────────────────────────
# auto = CPU 核数
max_streams=auto

# ── ZRAM swap 优先级 ───────────────────────
# 0~32767，系统有多 swap 设备时数字越大越优先
zram_priority=100

# ── VM 参数 ────────────────────────────────
# swappiness: 交换倾向 (0~32767，受内核上限约束)
#   内核 ≤5.x 上限通常 100; ≥6.x 通常 200
swappiness=130

# 脏页比例 (% 总内存)
dirty_background_ratio=2   # 后台刷新阈值
dirty_ratio=5              # 强制刷新阈值

# 脏页老化/回写间隔 (厘秒)
dirty_expire_centisecs=1000   # 3000=30s
dirty_writeback_centisecs=100 # 500=5s

# VFS 缓存回收压力 (默认 100)
# >100 优先回收 page cache, <100 优先保留
vfs_cache_pressure=125

# 页面簇大小 (auto 根据算法自适应: zstd→0, 其他→1)
page_cluster=auto

# 水位线缩放因子 (默认 10, 范围 1~1000)
watermark_scale_factor=100

# extra_free_kbytes: auto 根据 swap 大小自适应
extra_free_kbytes=auto

# 主动内存规整 (0~100, 0=关闭)
compaction_proactiveness=20

# 内存过量分配策略: 0=启发式 1=始终允许 2=禁止
overcommit_memory=1

# ── LMK (Low Memory Killer) ─────────────────
# 占内存百分比 (仅当内核暴露 minfree 节点时生效)
lmk_low_percent=6
lmk_medium_percent=4
lmk_critical_percent=2

# ── 模块行为 ───────────────────────────────
# 启用/禁用 (false 时只监控不优化)
enable=true

# 提前启动 (在 boot_completed 之前)
early_start=false

# 参数检查间隔 (秒)
watch_interval=5

# 禁用厂商内存回收 (Xiaomi/OPPO/VIVO)
disable_vendor_reclaim=false

# lmkd 绑核 (将 lmkd 绑定到小核)
bind_lmkd=false
# bind_lmkd_mask=0x0f   # 十六进制掩码，0x0f=小核

# ── 日志 ───────────────────────────────────
# 级别: quiet(仅错误) | normal(正常) | verbose(调试)
log_level=normal

# 同步输出到 logcat
log_to_logcat=false
