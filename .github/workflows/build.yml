name: Build & Package
on:
  push:
    branches: [master]
    tags: ['*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: |
          set -ex
          curl -sSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz -o /tmp/cross.tar.gz
          tar xzf /tmp/cross.tar.gz -C /tmp
          ls -la /tmp/cross*
          sudo install -m755 /tmp/cross /usr/local/bin/cross
          cross --version
          docker version

      - name: Build memoptd (aarch64)
        run: |
          cd memoptd
          cross build --release --target aarch64-unknown-linux-musl
          mkdir -p out
          cp target/aarch64-unknown-linux-musl/release/memoptd out/

      - name: Build memoptd (armv7)
        run: |
          cd memoptd
          cross build --release --target armv7-unknown-linux-musleabi
          cp target/armv7-unknown-linux-musleabi/release/memoptd out/memoptd.arm

      - name: Package module
        run: bash pack.sh

      - uses: actions/upload-artifact@v4
        with:
          name: MemoryOpt_Plus
          path: "*.zip"
