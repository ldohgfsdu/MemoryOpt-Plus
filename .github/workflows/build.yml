name: Build & Package
on:
  push:
    branches: [master]
    tags: ['*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-musl,armv7-unknown-linux-musleabi

      - name: Build memoptd (aarch64)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
        run: |
          cd memoptd
          cargo build --release --target aarch64-unknown-linux-musl
          mkdir -p out
          cp target/aarch64-unknown-linux-musl/release/memoptd out/

      - name: Build memoptd (armv7)
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABI_LINKER: rust-lld
        run: |
          cd memoptd
          cargo build --release --target armv7-unknown-linux-musleabi
          cp target/armv7-unknown-linux-musleabi/release/memoptd out/memoptd.arm

      - name: Package module
        run: bash pack.sh

      - uses: actions/upload-artifact@v4
        with:
          name: MemoryOpt_Plus
          path: "*.zip"
